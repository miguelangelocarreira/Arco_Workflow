name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/code-review-TJ4Rh

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Arco_Workflow/
          VITE_FIREBASE_API_KEY: AIzaSyAc_AA-eVoBy-8nOIiAd4jm5YPlZ6MM5HM
          VITE_FIREBASE_AUTH_DOMAIN: arcoworkflow-09203615-de0d1.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: arcoworkflow-09203615-de0d1
          VITE_FIREBASE_STORAGE_BUCKET: arcoworkflow-09203615-de0d1.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 412018727946
          VITE_FIREBASE_APP_ID: 1:412018727946:web:82a8db3d07074f8cfb13f3

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
